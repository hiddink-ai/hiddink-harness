[package]
name = "ontology-graph-rs"
version = "0.1.0"
edition = "2021"

[lib]
name = "ontology_graph_rs"
crate-type = ["cdylib", "rlib"]

[features]
# Enable the `extension-module` feature only when building the Python extension.
# This prevents the PyO3 linker from requiring a live Python dylib during
# `cargo test` (which links a native test harness, not a Python interpreter).
extension-module = ["pyo3/extension-module"]

[dependencies]
pyo3 = { version = "0.28" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "graph_bench"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
