[project]
name = "ontology-rag"
version = "0.3.0"
description = "Ontology+RAG context engine for oh-my-customcode"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "pyyaml>=6.0",
    "mcp>=1.0.0",
    "networkx>=3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
watch = ["watchdog>=4.0"]
rust = ["maturin>=1.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ontology_rag"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[project.scripts]
ontology-rag-server = "ontology_rag.mcp_server:main"
