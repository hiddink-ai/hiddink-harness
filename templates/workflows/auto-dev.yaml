# /hiddink-harness:workflow auto-dev — Full-auto release pipeline
# Pre-triages open issues → triage verify-done → plan → implement → verify → PR → followup

name: auto-dev
description: "Full-auto release pipeline: pre-triage → triage → plan → implement → verify → PR → followup"
mode: auto
error: halt-and-report

steps:
  - name: issue-analysis
    parallel:
      - name: pre-triage
        skill: professor-triage
        description: Run professor-triage on open issues that lack verify-done label
        condition: "open issues without label:verify-done exist"
      - name: triage
        skill: professor-triage
        description: Analyze verify-done issues against current codebase and perform automated triage

  - name: plan
    depends_on: issue-analysis
    skill: release-plan
    description: Group triaged issues into release units by priority and size
    input: triage-results

  - name: deep-plan
    skill: deep-plan
    description: Create detailed implementation plan for each release group
    foreach: release-group

  - name: implement
    prompt: "Execute implementation plan with appropriate agents"
    description: Execute implementation plan with appropriate agents
    foreach: planned-issue

  - name: verify
    skill: deep-verify
    description: Multi-angle release quality verification

  - name: release
    prompt: "Create release branch and pull request"
    description: Create release branch and pull request

  - name: followup
    skill: post-release-followup
    description: Recommend follow-up actions — user chooses to execute now or register as issues
