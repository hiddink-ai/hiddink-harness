name: CI

on:
  pull_request:
    branches:
      - develop
      - 'release/**'
  push:
    branches:
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lockfile-sync:
    name: Lockfile Sync
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Verify lockfile consistency
        run: |
          if ! bun install --frozen-lockfile 2>/dev/null; then
            echo "::error::bun.lockb is out of sync with package.json files"
            echo ""
            echo "A workspace package.json was modified without updating bun.lockb."
            echo "Fix: run 'bun install' locally and commit the updated bun.lockb"
            exit 1
          fi

  lint:
    name: Lint
    needs: [lockfile-sync]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

  test:
    name: Test
    needs: [lockfile-sync]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage and check threshold
        shell: bash
        run: |
          # Run coverage: tee shows output in real-time AND saves to file
          set +e
          rm -f /tmp/coverage-output.txt
          bun test --coverage 2>&1 | tee /tmp/coverage-output.txt
          # PIPESTATUS is bash-specific (requires shell: bash above)
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          COVERAGE_OUTPUT=$(cat /tmp/coverage-output.txt)

          # Workaround: bun test --coverage may exit non-zero even when tests pass
          # This heuristic checks actual test results in output (fragile if bun changes output format)
          # TODO(bun-update): Re-evaluate after bun stable release (currently using latest)
          if [ $TEST_EXIT -ne 0 ]; then
            if echo "$COVERAGE_OUTPUT" | grep -qE "[0-9]+ pass" && ! echo "$COVERAGE_OUTPUT" | grep -qE "[0-9]+ fail"; then
              echo "::warning::bun test exited with $TEST_EXIT but tests passed (known bun coverage quirk). Continuing..."
            else
              echo "::error::Tests failed with exit code $TEST_EXIT"
              exit 1
            fi
          fi

          # Extract coverage percentages from "All files" line
          # Format: "All files | XX.XX | YY.YY |"
          COVERAGE_LINE=$(echo "$COVERAGE_OUTPUT" | grep -E "All files.*\|")
          echo "Coverage line: $COVERAGE_LINE"

          # Extract function and line coverage percentages
          FUNC_COV=$(echo "$COVERAGE_LINE" | awk -F'|' '{print $2}' | tr -d ' ')
          LINE_COV=$(echo "$COVERAGE_LINE" | awk -F'|' '{print $3}' | tr -d ' ')

          echo "Function coverage: $FUNC_COV%"
          echo "Line coverage: $LINE_COV%"

          # Check if coverage is >= 99%
          # DI refactoring in rtk-installer.ts and codex-installer.ts enables full branch testing
          THRESHOLD=99

          FUNC_OK=$(echo "$FUNC_COV $THRESHOLD" | awk '{print ($1 >= $2) ? "1" : "0"}')
          LINE_OK=$(echo "$LINE_COV $THRESHOLD" | awk '{print ($1 >= $2) ? "1" : "0"}')

          if [ "$FUNC_OK" != "1" ] || [ "$LINE_OK" != "1" ]; then
            echo "::error::Coverage below threshold. Function: $FUNC_COV%, Line: $LINE_COV% (required: >= $THRESHOLD%)"
            exit 1
          fi

          echo "Coverage check passed: Function $FUNC_COV%, Line $LINE_COV% (threshold: $THRESHOLD%)"

  rust-test:
    name: Rust Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          prefix-key: "rust-test-v2-${{ runner.os }}"
          workspaces: packages/ontology-rag
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      - name: Run Rust tests
        working-directory: packages/ontology-rag
        run: cargo test --all

  version-sync:
    name: Version Sync
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify package.json and manifest.json versions match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./templates/manifest.json').version")

          echo "package.json version: $PKG_VERSION"
          echo "manifest.json version: $MANIFEST_VERSION"

          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Version mismatch! package.json ($PKG_VERSION) != templates/manifest.json ($MANIFEST_VERSION). Run: update manifest.json version to match package.json"
            exit 1
          fi

          echo "Version sync check passed: $PKG_VERSION"

  template-sync:
    name: Template Sync
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify .claude/ and templates/.claude/ are in sync
        run: |
          errors=0

          # Skill count sync
          src_skills=$(find .claude/skills -name "SKILL.md" 2>/dev/null | wc -l | tr -d ' ')
          tpl_skills=$(find templates/.claude/skills -name "SKILL.md" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$src_skills" != "$tpl_skills" ]; then
            echo "::error::Skill count mismatch: .claude/skills=$src_skills, templates/.claude/skills=$tpl_skills"
            # List missing skills
            diff <(find .claude/skills -name "SKILL.md" -exec dirname {} \; | xargs -I{} basename {} | sort) \
                 <(find templates/.claude/skills -name "SKILL.md" -exec dirname {} \; | xargs -I{} basename {} | sort) \
                 | grep "^[<>]" | head -10
            errors=$((errors + 1))
          fi

          # Hook script count sync
          src_hooks=$(ls .claude/hooks/scripts/*.sh 2>/dev/null | wc -l | tr -d ' ')
          tpl_hooks=$(ls templates/.claude/hooks/scripts/*.sh 2>/dev/null | wc -l | tr -d ' ')
          if [ "$src_hooks" != "$tpl_hooks" ]; then
            echo "::error::Hook script count mismatch: .claude/hooks/scripts=$src_hooks, templates/.claude/hooks/scripts=$tpl_hooks"
            errors=$((errors + 1))
          fi

          # hooks.json sync (compare entry count)
          src_hook_entries=$(cat .claude/hooks/hooks.json | grep -c '"matcher"' 2>/dev/null || echo 0)
          tpl_hook_entries=$(cat templates/.claude/hooks/hooks.json | grep -c '"matcher"' 2>/dev/null || echo 0)
          if [ "$src_hook_entries" != "$tpl_hook_entries" ]; then
            echo "::error::hooks.json matcher count mismatch: .claude=$src_hook_entries, templates=$tpl_hook_entries"
            errors=$((errors + 1))
          fi

          # Schema directory sync
          if [ -d ".claude/schemas" ]; then
            src_schemas=$(ls .claude/schemas/*.json 2>/dev/null | wc -l | tr -d ' ')
            tpl_schemas=$(ls templates/.claude/schemas/*.json 2>/dev/null | wc -l | tr -d ' ')
            if [ "$src_schemas" != "$tpl_schemas" ]; then
              echo "::error::Schema count mismatch: .claude/schemas=$src_schemas, templates/.claude/schemas=$tpl_schemas"
              errors=$((errors + 1))
            fi
          fi

          # Skill script files sync
          SCRIPT_ERRORS=0
          for script_dir in .claude/skills/*/scripts; do
            if [ -d "$script_dir" ]; then
              skill_name=$(basename $(dirname "$script_dir"))
              template_dir="templates/.claude/skills/$skill_name/scripts"
              if [ ! -d "$template_dir" ]; then
                echo "::error::Missing template scripts dir: $template_dir"
                SCRIPT_ERRORS=$((SCRIPT_ERRORS + 1))
              else
                for script in "$script_dir"/*; do
                  [ -e "$script" ] || continue
                  script_name=$(basename "$script")
                  if [ ! -f "$template_dir/$script_name" ]; then
                    echo "::error::Missing template script: $template_dir/$script_name"
                    SCRIPT_ERRORS=$((SCRIPT_ERRORS + 1))
                  fi
                done
              fi
            fi
          done
          if [ $SCRIPT_ERRORS -gt 0 ]; then
            errors=$((errors + SCRIPT_ERRORS))
          fi

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "Fix: copy missing files from .claude/ to templates/.claude/"
            echo "Example: cp .claude/skills/NEW_SKILL/SKILL.md templates/.claude/skills/NEW_SKILL/SKILL.md"
            exit 1
          fi

          echo "Template sync verified: $src_skills skills, $src_hooks hooks, $src_hook_entries hook matchers, skill scripts OK"

      # Agents count sync
      - name: Verify agents sync
        run: |
          SRC_COUNT=$(ls .claude/agents/*.md 2>/dev/null | wc -l | tr -d ' ')
          TPL_COUNT=$(ls templates/.claude/agents/*.md 2>/dev/null | wc -l | tr -d ' ')
          echo "Source agents: $SRC_COUNT, Template agents: $TPL_COUNT"
          if [ "$SRC_COUNT" != "$TPL_COUNT" ]; then
            echo "::error::Agent count mismatch: source=$SRC_COUNT template=$TPL_COUNT"
            exit 1
          fi

      # Rules count sync
      - name: Verify rules sync
        run: |
          SRC_COUNT=$(ls .claude/rules/*.md 2>/dev/null | wc -l | tr -d ' ')
          TPL_COUNT=$(ls templates/.claude/rules/*.md 2>/dev/null | wc -l | tr -d ' ')
          echo "Source rules: $SRC_COUNT, Template rules: $TPL_COUNT"
          if [ "$SRC_COUNT" != "$TPL_COUNT" ]; then
            echo "::error::Rules count mismatch: source=$SRC_COUNT template=$TPL_COUNT"
            exit 1
          fi

      # Guides count sync
      - name: Verify guides sync
        run: |
          SRC_COUNT=$(find guides -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          TPL_COUNT=$(find templates/guides -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          echo "Source guides: $SRC_COUNT, Template guides: $TPL_COUNT"
          if [ "$SRC_COUNT" != "$TPL_COUNT" ]; then
            echo "::error::Guides count mismatch: source=$SRC_COUNT template=$TPL_COUNT"
            exit 1
          fi

      # CLAUDE.md count validation
      - name: Verify CLAUDE.md counts
        run: |
          ACTUAL_AGENTS=$(ls .claude/agents/*.md | wc -l | tr -d ' ')
          ACTUAL_SKILLS=$(find .claude/skills -name 'SKILL.md' | wc -l | tr -d ' ')
          ACTUAL_RULES=$(ls .claude/rules/*.md | wc -l | tr -d ' ')
          ACTUAL_GUIDES=$(find guides -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')

          # Check CLAUDE.md agent count
          DOC_AGENTS=$(grep -oP 'ņŚÉņØ┤ņĀäĒŖĖ ņĀĢņØś \(\K[0-9]+' CLAUDE.md || grep -oP 'agents.*\((\K[0-9]+)' CLAUDE.md || echo "0")
          DOC_SKILLS=$(grep -oP 'ņŖżĒé¼ \(\K[0-9]+' CLAUDE.md || grep -oP 'skills.*\((\K[0-9]+)' CLAUDE.md || echo "0")

          echo "Actual: agents=$ACTUAL_AGENTS skills=$ACTUAL_SKILLS rules=$ACTUAL_RULES guides=$ACTUAL_GUIDES"
          echo "CLAUDE.md: agents=$DOC_AGENTS skills=$DOC_SKILLS"

          ERRORS=0
          if [ "$ACTUAL_AGENTS" != "$DOC_AGENTS" ] && [ "$DOC_AGENTS" != "0" ]; then
            echo "::warning::CLAUDE.md agent count ($DOC_AGENTS) != actual ($ACTUAL_AGENTS)"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$ACTUAL_SKILLS" != "$DOC_SKILLS" ] && [ "$DOC_SKILLS" != "0" ]; then
            echo "::warning::CLAUDE.md skill count ($DOC_SKILLS) != actual ($ACTUAL_SKILLS)"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::CLAUDE.md count mismatches found"
            exit 1
          fi
