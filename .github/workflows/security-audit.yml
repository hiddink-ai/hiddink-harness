name: Security Audit

on:
  # Weekly audit every Monday at 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'
  # Also run on PRs to catch new vulnerabilities
  pull_request:
    branches:
      - develop
      - 'release/**'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: |
          # Generate package-lock.json for npm audit (bun uses bun.lock)
          # --workspaces flag needed for monorepo workspace support
          npm i --package-lock-only --ignore-scripts --workspaces 2>/dev/null || \
            npm i --package-lock-only --ignore-scripts 2>/dev/null || true
          # Fallback: if package-lock.json still doesn't exist, skip audit
          if [ ! -f package-lock.json ]; then
            echo "::warning::Could not generate package-lock.json for npm audit. Skipping."
            exit 0
          fi
          # Run npm audit (fails on high/critical vulnerabilities)
          npm audit --audit-level=high

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Security vulnerabilities detected. Please update dependencies."
          echo "Run 'bun pm audit' locally to see details."
