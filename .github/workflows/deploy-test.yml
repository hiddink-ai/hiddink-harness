name: Deploy Test

on:
  pull_request:
    branches:
      - 'release/**'

jobs:
  deploy-test:
    name: Deploy Test with Verdaccio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Start Verdaccio
        run: |
          npm install -g verdaccio
          verdaccio &
          sleep 5

      - name: Configure npm for Verdaccio
        run: |
          npm config set registry http://localhost:4873/
          # Create user for publishing (htpasswd disabled by default in verdaccio)
          npm config set //localhost:4873/:_authToken "test-token"

      - name: Publish to Verdaccio
        run: |
          npm publish --registry http://localhost:4873/

      - name: Test global install
        run: |
          npm install -g hiddink-harness --registry http://localhost:4873/

      - name: Test hiddink-harness --version
        run: hiddink-harness --version

      - name: Test hiddink-harness --help
        run: hiddink-harness --help

      - name: Test hiddink-harness init (dry run)
        run: |
          # Create a test directory
          mkdir -p /tmp/test-project
          cd /tmp/test-project

          # Test init command (use echo to simulate user input or --help for now)
          hiddink-harness init --help || echo "Init help displayed"

      - name: Cleanup
        if: always()
        run: |
          pkill -f verdaccio || true
