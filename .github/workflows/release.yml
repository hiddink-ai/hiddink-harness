name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Node.js for npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Build
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            dist/
            packages/*/dist/
            packages/*/build/
          retention-days: 1

  docs-validate:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run documentation validation
        run: bun run .github/scripts/validate-docs.ts --programmatic-only

  publish-npm:
    name: Publish npm
    needs: [test, docs-validate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js for npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Verify build artifacts
        run: |
          test -f dist/index.js || { echo "::error::Missing dist/index.js"; exit 1; }
          echo "Build artifacts verified"

      # TODO(v0.0.3): re-enable after .claude/templates parity strategy decided
      # - name: Verify template sync
      #   run: bash .github/scripts/verify-template-sync.sh

      - name: Verify version sync (package.json vs templates/manifest.json)
        run: bash .github/scripts/verify-version-sync.sh

      # Check if version already exists on npm
      - name: Check npm version
        id: npm_check
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if this version already exists on npm
          if npm view hiddink-harness@$VERSION version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION already exists on npm, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Publish to npm (skip if already exists)
      - name: Publish to npm
        if: steps.npm_check.outputs.exists == 'false'
        run: |
          npm publish --ignore-scripts --access public 2>&1 || {
            EXIT_CODE=$?
            # Check if failure is due to version already existing (race condition with local publish)
            if npm view hiddink-harness@${{ steps.npm_check.outputs.version }} version 2>/dev/null; then
              echo "::notice::Version ${{ steps.npm_check.outputs.version }} was published externally (race condition). Continuing."
            else
              exit $EXIT_CODE
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Re-configure for GitHub Packages
      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@baekenough'

      # Check if version already exists on GitHub Packages
      - name: Check GitHub Packages version
        id: ghp_check
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Check if this version already exists on GitHub Packages
          if npm view @hiddink-ai/hiddink-harness@$VERSION version --registry=https://npm.pkg.github.com 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Version $VERSION already exists on GitHub Packages, skipping publish"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to GitHub Packages (skip if already exists)
      - name: Publish to GitHub Packages
        if: steps.ghp_check.outputs.exists == 'false'
        run: |
          # Update package name for GitHub Packages (scoped)
          jq '.name = "@hiddink-ai/hiddink-harness" | .publishConfig = {"registry": "https://npm.pkg.github.com", "access": "public"}' package.json > package.json.tmp && mv package.json.tmp package.json
          npm publish --ignore-scripts 2>&1 || {
            EXIT_CODE=$?
            # Check if failure is due to version already existing (race condition with local publish)
            VERSION=${GITHUB_REF#refs/tags/v}
            if npm view @hiddink-ai/hiddink-harness@$VERSION version --registry=https://npm.pkg.github.com 2>/dev/null; then
              echo "::notice::Version $VERSION was published externally (race condition). Continuing."
            else
              exit $EXIT_CODE
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Restore package.json (only if we modified it)
      - name: Restore package.json
        if: steps.ghp_check.outputs.exists == 'false'
        run: git checkout package.json

  github-release:
    name: GitHub Release
    needs: [publish-npm]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Extract changelog for this version (with graceful fallback)
      - name: Extract Release Notes
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check for CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found. Will use auto-generated release notes."
            echo "notes=" >> $GITHUB_OUTPUT
            echo "has_changelog=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract changelog section for this version
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for version ${VERSION}."
            echo "::warning::Will use auto-generated release notes. Consider adding a '## [${VERSION}]' section to CHANGELOG.md."
            echo "notes=" >> $GITHUB_OUTPUT
            echo "has_changelog=false" >> $GITHUB_OUTPUT
          else
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "has_changelog=true" >> $GITHUB_OUTPUT
            echo "::notice::Found changelog entry for v${VERSION}"
          fi

      # Create GitHub Release with changelog or auto-generated notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes || '_Auto-generated release notes (CHANGELOG.md entry missing)_' }}

            ---

            ### Installation

            ```bash
            # npm
            npm install hiddink-harness@${{ steps.changelog.outputs.version }}

            # or use npx
            npx hiddink-harness@${{ steps.changelog.outputs.version }} init
            ```

            ### Links
            - [npm package](https://www.npmjs.com/package/hiddink-harness/v/${{ steps.changelog.outputs.version }})
            - [GitHub Package](https://github.com/hiddink-ai/hiddink-harness/pkgs/npm/hiddink-harness)
          generate_release_notes: ${{ steps.changelog.outputs.has_changelog != 'true' }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    name: Verify Release
    needs: [github-release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify npm publish
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for i in 1 2 3; do
            PUBLISHED=$(npm view hiddink-harness@${VERSION} version 2>/dev/null || true)
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "✓ npm: hiddink-harness@${VERSION} confirmed"
              exit 0
            fi
            echo "Attempt $i: not found yet, waiting 30s..."
            sleep 30
          done
          echo "::error::npm package not found after 3 attempts: hiddink-harness@${VERSION}"
          exit 1

      - name: Verify GitHub Packages publish
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for i in 1 2 3; do
            PUBLISHED=$(npm view @hiddink-ai/hiddink-harness@${VERSION} version \
              --registry=https://npm.pkg.github.com 2>/dev/null || true)
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "✓ GitHub Packages: @hiddink-ai/hiddink-harness@${VERSION} confirmed"
              exit 0
            fi
            echo "Attempt $i: not found yet, waiting 30s..."
            sleep 30
          done
          echo "::warning::GitHub Package not found after 3 attempts (eventual consistency — package will appear later)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GitHub Release
        run: |
          VERSION=${{ steps.version.outputs.version }}
          RELEASE=$(gh api repos/${{ github.repository }}/releases/tags/v${VERSION} \
            --jq '.tag_name' 2>/dev/null || true)
          if [ "$RELEASE" = "v${VERSION}" ]; then
            echo "✓ GitHub Release: v${VERSION} confirmed"
          else
            echo "::error::GitHub Release not found for v${VERSION}"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "## Release Verification: v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          NPM=$(npm view hiddink-harness@${VERSION} version 2>/dev/null || echo "NOT FOUND")
          GHP=$(npm view @hiddink-ai/hiddink-harness@${VERSION} version \
            --registry=https://npm.pkg.github.com 2>/dev/null || echo "NOT FOUND")
          GHR=$(gh api repos/${{ github.repository }}/releases/tags/v${VERSION} \
            --jq '.tag_name' 2>/dev/null || echo "NOT FOUND")
          echo "| npm | ${NPM} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Packages | ${GHP} |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ${GHR} |" >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
